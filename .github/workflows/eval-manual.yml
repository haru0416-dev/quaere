name: Manual LLM eval

on:
  workflow_dispatch:
    inputs:
      runner:
        description: 'Runner preset'
        required: true
        default: codex
        type: choice
        options:
          - codex
          - claude
      skill:
        description: 'Optional skill filter (e.g. quaere-evidence)'
        required: false
        type: string
      scenario:
        description: 'Optional scenario id filter'
        required: false
        type: string
      mode:
        description: 'baseline / with-skill / both'
        required: false
        default: both
        type: choice
        options:
          - baseline
          - with-skill
          - both
      require_assertions:
        description: 'Fail the run if any scenario lacks assertions'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  eval:
    name: eval (${{ inputs.skill || 'all' }})
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run skill evals
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          RUNNER_PRESET: ${{ inputs.runner }}
          EVAL_MODE: ${{ inputs.mode }}
          SKILL_FILTER: ${{ inputs.skill }}
          SCENARIO_FILTER: ${{ inputs.scenario }}
          REQUIRE_ASSERTIONS: ${{ inputs.require_assertions }}
        run: |
          set -euo pipefail
          case "$RUNNER_PRESET" in
            codex) runner="codex=codex exec - < \$prompt_file" ;;
            claude) runner="claude=claude -p < \$prompt_file" ;;
            *) echo "unsupported runner preset: $RUNNER_PRESET" >&2; exit 2 ;;
          esac
          args=(--runner "$runner" --mode "$EVAL_MODE")
          if [ -n "$SKILL_FILTER" ]; then args+=(--skill "$SKILL_FILTER"); fi
          if [ -n "$SCENARIO_FILTER" ]; then args+=(--scenario "$SCENARIO_FILTER"); fi
          if [ "$REQUIRE_ASSERTIONS" = "true" ]; then args+=(--require-assertions); fi
          python evals/run_skill_evals.py "${args[@]}"

      - name: Upload eval-results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: eval-results-${{ github.run_id }}
          path: eval-results/
          if-no-files-found: warn
          retention-days: 30
