name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.1.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  skills:
    name: skill tarball
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - name: Bundle skills
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          tag="$RELEASE_TAG"
          [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-+][A-Za-z0-9_.-]+)?$ ]] || { echo "invalid release tag: $tag" >&2; exit 2; }
          archive="quaere-skills-${tag}.tar.gz"
          tar -czf "$archive" skills LICENSE README.md
          mkdir -p dist
          mv "$archive" dist/
      - uses: actions/upload-artifact@v7
        with:
          name: skill-bundle
          path: dist/*.tar.gz
          if-no-files-found: error
          retention-days: 7

  release:
    name: publish release
    needs: [skills]
    runs-on: ubuntu-latest
    # id-token: write enables cosign keyless (OIDC) signing below. Scoped to
    # this job, not granted repo-wide.
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Stage release assets
        run: |
          set -euo pipefail
          mkdir -p release
          find artifacts -name '*.tar.gz' -exec mv {} release/ \;
          cd release
          sha256sum -- *.tar.gz > SHA256SUMS
          ls -la
          cat SHA256SUMS

      - name: Install cosign
        # sigstore/cosign-installer does not ship a `v4` major-version
        # alias tag (only v2 and v3 aliases exist; v4.x is point tags
        # only). v3 alias still tracks the latest v3.x release.
        uses: sigstore/cosign-installer@v3

      - name: Sign SHA256SUMS (cosign keyless OIDC)
        working-directory: release
        run: |
          set -euo pipefail
          # Keyless signing binds the signature to this exact workflow ref
          # (refs/tags/vX.Y.Z) via Sigstore's transparency log. An attacker
          # who steals the release artifact write path cannot forge a
          # matching signature without also running this workflow at this
          # tag.
          cosign sign-blob --yes \
            --output-signature SHA256SUMS.sig \
            --output-certificate SHA256SUMS.pem \
            SHA256SUMS
          ls -la SHA256SUMS*

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          tag="$RELEASE_TAG"
          [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-+][A-Za-z0-9_.-]+)?$ ]] || { echo "invalid release tag: $tag" >&2; exit 2; }
          gh release create "$tag" \
            release/*.tar.gz release/SHA256SUMS release/SHA256SUMS.sig release/SHA256SUMS.pem \
            --title "$tag" \
            --generate-notes \
            --repo "$GITHUB_REPOSITORY"

  npm-publish:
    name: publish to npm
    needs: release
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
    # id-token: write enables npm provenance (Sigstore OIDC) attestations
    # when `pnpm publish --provenance` runs. The provenance attestation
    # binds the published tarball to this exact workflow ref and tag, so
    # consumers can verify the chain back to the source commit. This is
    # the npm-side analog of the cosign signature on the GitHub Release.
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - uses: pnpm/action-setup@v6
        with:
          version: 11

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm
          cache-dependency-path: cli/pnpm-lock.yaml

      - name: Verify tag matches cli/package.json version
        working-directory: cli
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          tag="${RELEASE_TAG#v}"
          pkg_version=$(node -p "require('./package.json').version")
          if [ "$tag" != "$pkg_version" ]; then
            echo "tag $tag does not match cli/package.json version $pkg_version" >&2
            exit 2
          fi

      - name: Install dependencies
        working-directory: cli
        run: pnpm install --frozen-lockfile

      - name: Check (lint, typecheck, test)
        working-directory: cli
        run: pnpm check

      - name: Build
        working-directory: cli
        run: pnpm build

      - name: Publish to npm with provenance
        # Authentication is OIDC-only (npm Trusted Publishers).
        # The npm registry verifies the GitHub Actions OIDC token against
        # the trusted-publisher binding configured on
        # https://www.npmjs.com/package/quaere-cli/access, so no
        # NODE_AUTH_TOKEN / NPM_TOKEN is needed in this job.
        working-directory: cli
        run: pnpm publish --provenance --access public --no-git-checks
