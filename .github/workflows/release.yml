name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.1.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  skills:
    name: skill tarball
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - name: Bundle skills
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          tag="$RELEASE_TAG"
          [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-+][A-Za-z0-9_.-]+)?$ ]] || { echo "invalid release tag: $tag" >&2; exit 2; }
          archive="quaere-skills-${tag}.tar.gz"
          tar -czf "$archive" skills LICENSE README.md
          mkdir -p dist
          mv "$archive" dist/
      - uses: actions/upload-artifact@v7
        with:
          name: skill-bundle
          path: dist/*.tar.gz
          if-no-files-found: error
          retention-days: 7

  release:
    name: publish release
    needs: [skills]
    runs-on: ubuntu-latest
    # id-token: write enables cosign keyless (OIDC) signing below. Scoped to
    # this job, not granted repo-wide.
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Stage release assets
        run: |
          set -euo pipefail
          mkdir -p release
          find artifacts -name '*.tar.gz' -exec mv {} release/ \;
          cd release
          sha256sum -- *.tar.gz > SHA256SUMS
          ls -la
          cat SHA256SUMS

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign SHA256SUMS (cosign keyless OIDC)
        working-directory: release
        run: |
          set -euo pipefail
          # Keyless signing binds the signature to this exact workflow ref
          # (refs/tags/vX.Y.Z) via Sigstore's transparency log. An attacker
          # who steals the release artifact write path cannot forge a
          # matching signature without also running this workflow at this
          # tag.
          cosign sign-blob --yes \
            --output-signature SHA256SUMS.sig \
            --output-certificate SHA256SUMS.pem \
            SHA256SUMS
          ls -la SHA256SUMS*

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          tag="$RELEASE_TAG"
          [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-+][A-Za-z0-9_.-]+)?$ ]] || { echo "invalid release tag: $tag" >&2; exit 2; }
          gh release create "$tag" \
            release/*.tar.gz release/SHA256SUMS release/SHA256SUMS.sig release/SHA256SUMS.pem \
            --title "$tag" \
            --generate-notes \
            --repo "$GITHUB_REPOSITORY"
