name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.1.0)'
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
            linker: aarch64-linux-gnu-gcc
            apt: gcc-aarch64-linux-gnu
          - target: x86_64-apple-darwin
            os: macos-latest
            cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            cross: false
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli
          key: release-${{ matrix.target }}

      - name: Install cross linker (linux aarch64 only)
        if: matrix.cross == true
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt }}

      - name: Set cross-linker env (linux aarch64 only)
        if: matrix.linker != ''
        run: |
          target_env=$(echo '${{ matrix.target }}' | tr 'a-z-' 'A-Z_')
          echo "CARGO_TARGET_${target_env}_LINKER=${{ matrix.linker }}" >> "$GITHUB_ENV"

      - name: Build release binary
        working-directory: cli
        run: cargo build --release --target ${{ matrix.target }}

      - name: Bundle archive
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          tag="$RELEASE_TAG"
          [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-+][A-Za-z0-9_.-]+)?$ ]] || { echo "invalid release tag: $tag" >&2; exit 2; }
          archive="quaere-${tag}-${{ matrix.target }}"
          mkdir -p "dist/${archive}"
          cp "cli/target/${{ matrix.target }}/release/quaere" "dist/${archive}/quaere"
          cp LICENSE README.md "dist/${archive}/"
          tar -czf "dist/${archive}.tar.gz" -C dist "${archive}"
          rm -rf "dist/${archive}"

      - uses: actions/upload-artifact@v7
        with:
          name: bin-${{ matrix.target }}
          path: dist/*.tar.gz
          if-no-files-found: error
          retention-days: 7

  skills:
    name: skill tarball
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - name: Bundle skills
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          tag="$RELEASE_TAG"
          [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-+][A-Za-z0-9_.-]+)?$ ]] || { echo "invalid release tag: $tag" >&2; exit 2; }
          archive="quaere-skills-${tag}.tar.gz"
          tar -czf "$archive" skills LICENSE README.md
          mkdir -p dist
          mv "$archive" dist/
      - uses: actions/upload-artifact@v7
        with:
          name: skill-bundle
          path: dist/*.tar.gz
          if-no-files-found: error
          retention-days: 7

  release:
    name: publish release
    needs: [build, skills]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Stage release assets
        run: |
          set -euo pipefail
          mkdir -p release
          find artifacts -name '*.tar.gz' -exec mv {} release/ \;
          cd release
          sha256sum -- *.tar.gz > SHA256SUMS
          ls -la
          cat SHA256SUMS

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          tag="$RELEASE_TAG"
          [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-+][A-Za-z0-9_.-]+)?$ ]] || { echo "invalid release tag: $tag" >&2; exit 2; }
          gh release create "$tag" \
            release/*.tar.gz release/SHA256SUMS \
            --title "$tag" \
            --generate-notes \
            --repo "$GITHUB_REPOSITORY"

  bump-homebrew:
    name: bump homebrew tap
    needs: release
    runs-on: ubuntu-latest
    # Skipped automatically if the cross-repo token is not configured;
    # see scripts/install.sh and README for the one-off PAT setup.
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Fetch SHA256SUMS from the just-published release
        id: shas
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          tag="$RELEASE_TAG"
          [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-+][A-Za-z0-9_.-]+)?$ ]] || { echo "invalid release tag: $tag" >&2; exit 2; }
          gh release download "$tag" --repo "$GITHUB_REPOSITORY" -p SHA256SUMS -O /tmp/SHA256SUMS
          extract() { awk -v t="$1" '$2 ~ t {print $1}' /tmp/SHA256SUMS; }
          {
            echo "tag=$tag"
            echo "version=${tag#v}"
            echo "arm_mac=$(extract aarch64-apple-darwin)"
            echo "intel_mac=$(extract x86_64-apple-darwin)"
            echo "arm_linux=$(extract aarch64-unknown-linux-gnu)"
            echo "intel_linux=$(extract x86_64-unknown-linux-gnu)"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew-quaere tap
        uses: actions/checkout@v6
        with:
          repository: haru0416-dev/homebrew-quaere
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Rewrite Formula/quaere.rb
        working-directory: tap
        env:
          V: ${{ steps.shas.outputs.version }}
          ARM_MAC: ${{ steps.shas.outputs.arm_mac }}
          INTEL_MAC: ${{ steps.shas.outputs.intel_mac }}
          ARM_LINUX: ${{ steps.shas.outputs.arm_linux }}
          INTEL_LINUX: ${{ steps.shas.outputs.intel_linux }}
        run: |
          python3 - <<'PY'
          import os, re, pathlib, sys
          p = pathlib.Path("Formula/quaere.rb")
          text = p.read_text()
          text, n_ver = re.subn(r'version "[^"]+"', f'version "{os.environ["V"]}"', text, count=1)
          if n_ver != 1:
              sys.exit("could not locate `version` line in Formula/quaere.rb")
          shas = [os.environ[k] for k in ("ARM_MAC", "INTEL_MAC", "ARM_LINUX", "INTEL_LINUX")]
          if not all(shas):
              sys.exit(f"missing one or more SHA values: {shas}")
          _it = iter(shas)
          text, n_sha = re.subn(r'sha256 "[0-9a-f]+"', lambda _m: f'sha256 "{next(_it)}"', text, count=4)
          if n_sha != 4:
              sys.exit(f"expected 4 sha256 lines, rewrote {n_sha}")
          p.write_text(text)
          PY
          git --no-pager diff Formula/quaere.rb

      - name: Commit and push
        working-directory: tap
        env:
          TAG: ${{ steps.shas.outputs.tag }}
        run: |
          set -euo pipefail
          if git diff --quiet Formula/quaere.rb; then
            echo "no formula change for $TAG (already at this version?); skipping push"
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/quaere.rb
          git commit -m "feat: bump Quaere formula to $TAG"
          git push origin HEAD:main

  cargo-publish:
    name: publish to crates.io
    needs: release
    runs-on: ubuntu-latest
    # Skipped when the required token is not configured. Token setup is a
    # one-off; see README "Contributing" for the steps.
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Verify tag matches Cargo.toml version
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          tag="${RELEASE_TAG#v}"
          manifest_version=$(awk -F\" '/^version = /{print $2; exit}' cli/Cargo.toml)
          if [ "$tag" != "$manifest_version" ]; then
            echo "tag $tag does not match cli/Cargo.toml version $manifest_version" >&2
            exit 2
          fi

      - name: Cargo package dry-run
        working-directory: cli
        run: cargo publish --dry-run

      - name: Cargo publish
        working-directory: cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish
