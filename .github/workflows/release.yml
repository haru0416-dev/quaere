name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.1.0)'
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 builds as fully static against musl libc. The
          # previous ubuntu-latest + GLIBC artifact required GLIBC 2.39
          # (Ubuntu 24.04 builder) and broke on Debian Bookworm / Ubuntu
          # 22.04 / RHEL 8 — Terminal-Bench task containers surfaced this
          # at v0.3.0. musl static avoids the GLIBC dependency entirely.
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            runner: cargo
            apt: musl-tools
          # Linux aarch64 uses the `cross` tool because the C bits inside
          # ring need a musl-aware aarch64 toolchain that is not in apt.
          # `cross` ships a Docker image with the right toolchain pre-set.
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            runner: cross
          - target: x86_64-apple-darwin
            os: macos-latest
            runner: cargo
          - target: aarch64-apple-darwin
            os: macos-latest
            runner: cargo
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli
          key: release-${{ matrix.target }}

      - name: Install apt prerequisites
        if: matrix.apt
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ${{ matrix.apt }}

      - name: Install cross
        if: matrix.runner == 'cross'
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build release binary (cargo)
        if: matrix.runner == 'cargo'
        working-directory: cli
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build release binary (cross, mounted from repo root)
        if: matrix.runner == 'cross'
        run: cross build --manifest-path cli/Cargo.toml --release --target ${{ matrix.target }}

      - name: Bundle archive
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          tag="$RELEASE_TAG"
          [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-+][A-Za-z0-9_.-]+)?$ ]] || { echo "invalid release tag: $tag" >&2; exit 2; }
          archive="quaere-${tag}-${{ matrix.target }}"
          mkdir -p "dist/${archive}"
          cp "cli/target/${{ matrix.target }}/release/quaere" "dist/${archive}/quaere"
          cp LICENSE README.md "dist/${archive}/"
          tar -czf "dist/${archive}.tar.gz" -C dist "${archive}"
          rm -rf "dist/${archive}"

      - uses: actions/upload-artifact@v7
        with:
          name: bin-${{ matrix.target }}
          path: dist/*.tar.gz
          if-no-files-found: error
          retention-days: 7

  skills:
    name: skill tarball
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - name: Bundle skills
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          tag="$RELEASE_TAG"
          [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-+][A-Za-z0-9_.-]+)?$ ]] || { echo "invalid release tag: $tag" >&2; exit 2; }
          archive="quaere-skills-${tag}.tar.gz"
          tar -czf "$archive" skills LICENSE README.md
          mkdir -p dist
          mv "$archive" dist/
      - uses: actions/upload-artifact@v7
        with:
          name: skill-bundle
          path: dist/*.tar.gz
          if-no-files-found: error
          retention-days: 7

  release:
    name: publish release
    needs: [build, skills]
    runs-on: ubuntu-latest
    # id-token: write enables cosign keyless (OIDC) signing below. Scoped to
    # this job, not granted repo-wide.
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Stage release assets
        run: |
          set -euo pipefail
          mkdir -p release
          find artifacts -name '*.tar.gz' -exec mv {} release/ \;
          cd release
          sha256sum -- *.tar.gz > SHA256SUMS
          ls -la
          cat SHA256SUMS

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign SHA256SUMS (cosign keyless OIDC)
        working-directory: release
        run: |
          set -euo pipefail
          # Keyless signing binds the signature to this exact workflow ref
          # (refs/tags/vX.Y.Z) via Sigstore's transparency log. install.sh
          # verifies the cert identity, so an attacker who steals the
          # release artifact write path cannot forge a matching signature
          # without also running this workflow at this tag.
          cosign sign-blob --yes \
            --output-signature SHA256SUMS.sig \
            --output-certificate SHA256SUMS.pem \
            SHA256SUMS
          ls -la SHA256SUMS*

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          tag="$RELEASE_TAG"
          [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-+][A-Za-z0-9_.-]+)?$ ]] || { echo "invalid release tag: $tag" >&2; exit 2; }
          gh release create "$tag" \
            release/*.tar.gz release/SHA256SUMS release/SHA256SUMS.sig release/SHA256SUMS.pem \
            --title "$tag" \
            --generate-notes \
            --repo "$GITHUB_REPOSITORY"

  bump-homebrew:
    name: bump homebrew tap
    needs: release
    runs-on: ubuntu-latest
    # Skipped automatically if the cross-repo token is not configured;
    # see scripts/install.sh and README for the one-off PAT setup.
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Fetch SHA256SUMS from the just-published release
        id: shas
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          tag="$RELEASE_TAG"
          [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-+][A-Za-z0-9_.-]+)?$ ]] || { echo "invalid release tag: $tag" >&2; exit 2; }
          gh release download "$tag" --repo "$GITHUB_REPOSITORY" -p SHA256SUMS -O /tmp/SHA256SUMS
          extract() { awk -v t="$1" '$2 ~ t {print $1}' /tmp/SHA256SUMS; }
          {
            echo "tag=$tag"
            echo "version=${tag#v}"
            echo "arm_mac=$(extract aarch64-apple-darwin)"
            echo "intel_mac=$(extract x86_64-apple-darwin)"
            echo "arm_linux=$(extract aarch64-unknown-linux-musl)"
            echo "intel_linux=$(extract x86_64-unknown-linux-musl)"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew-quaere tap
        uses: actions/checkout@v6
        with:
          repository: haru0416-dev/homebrew-quaere
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Rewrite Formula/quaere.rb
        working-directory: tap
        env:
          V: ${{ steps.shas.outputs.version }}
          ARM_MAC: ${{ steps.shas.outputs.arm_mac }}
          INTEL_MAC: ${{ steps.shas.outputs.intel_mac }}
          ARM_LINUX: ${{ steps.shas.outputs.arm_linux }}
          INTEL_LINUX: ${{ steps.shas.outputs.intel_linux }}
        run: |
          python3 - <<'PY'
          import os, re, pathlib, sys
          p = pathlib.Path("Formula/quaere.rb")
          text = p.read_text()
          text, n_ver = re.subn(r'version "[^"]+"', f'version "{os.environ["V"]}"', text, count=1)
          if n_ver != 1:
              sys.exit("could not locate `version` line in Formula/quaere.rb")
          # SHA rewrite is anchored on the URL line so the substitution is
          # arch-aware, not positional: even if the on_macos/on_linux blocks
          # were reordered or a new arch were added, each sha256 line stays
          # paired with its matching artifact URL. The previous positional
          # iter() approach would have silently mismatched SHAs to URLs in
          # those cases. See audit finding F-003.
          sha_by_target = {
              "aarch64-apple-darwin":        os.environ["ARM_MAC"],
              "x86_64-apple-darwin":         os.environ["INTEL_MAC"],
              "aarch64-unknown-linux-musl":  os.environ["ARM_LINUX"],
              "x86_64-unknown-linux-musl":   os.environ["INTEL_LINUX"],
          }
          if not all(sha_by_target.values()):
              sys.exit(f"missing one or more SHA values: {sha_by_target}")
          targets_alt = "|".join(re.escape(t) for t in sha_by_target)
          pair_re = re.compile(
              rf'(url "[^"]*-(?P<target>{targets_alt})[^"]*"\s*\n\s*sha256 ")[0-9a-f]+(")'
          )
          seen = set()
          def _replace(m):
              target = m.group("target")
              seen.add(target)
              return m.group(1) + sha_by_target[target] + m.group(3)
          text, n_sha = pair_re.subn(_replace, text)
          if n_sha != 4 or seen != set(sha_by_target):
              sys.exit(
                  f"expected 4 url+sha256 pairs covering {sorted(sha_by_target)}; "
                  f"rewrote {n_sha}, matched targets {sorted(seen)}"
              )
          p.write_text(text)
          PY
          git --no-pager diff Formula/quaere.rb

      - name: Commit and push
        working-directory: tap
        env:
          TAG: ${{ steps.shas.outputs.tag }}
        run: |
          set -euo pipefail
          if git diff --quiet Formula/quaere.rb; then
            echo "no formula change for $TAG (already at this version?); skipping push"
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/quaere.rb
          git commit -m "feat: bump Quaere formula to $TAG"
          git push origin HEAD:main

  cargo-publish:
    name: publish to crates.io
    needs: release
    runs-on: ubuntu-latest
    # Skipped when the required token is not configured. Token setup is a
    # one-off; see README "Contributing" for the steps.
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Verify tag matches Cargo.toml version
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          tag="${RELEASE_TAG#v}"
          manifest_version=$(awk -F\" '/^version = /{print $2; exit}' cli/Cargo.toml)
          if [ "$tag" != "$manifest_version" ]; then
            echo "tag $tag does not match cli/Cargo.toml version $manifest_version" >&2
            exit 2
          fi

      - name: Cargo package dry-run
        working-directory: cli
        run: cargo publish --dry-run

      - name: Cargo publish
        working-directory: cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish
